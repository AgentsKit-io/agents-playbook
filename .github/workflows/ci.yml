name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:okf-type
      - run: pnpm check:doc-bridge-config
      - run: pnpm docs:bridge:index
      - run: git diff --exit-code -- doc-bridge.config.json .doc-bridge
      - run: pnpm docs:bridge:gate
      - run: pnpm check:readme-standard
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm build
      - run: test -s public/playbook-bundle.zip
      - run: git diff --exit-code -- app/stats.snapshot.json public/deterministic

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  playbook-package:
    name: Playbook package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install pre-commit==4.6.1
      - run: node scripts/sync-playbook-package.mjs --check
      - run: node --test packages/playbook/test/cli.test.mjs
      - run: node scripts/test-pre-commit-hook.mjs
      - run: npm pack --dry-run
        working-directory: packages/playbook
