<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Agents Playbook adoption flow</title>
  <desc id="desc">A production failure becomes a documented pattern, a copy-ready recipe, an automated gate, and trustworthy agent output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#09111f"/><stop offset="1" stop-color="#151126"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#2997ff"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1200" height="560" rx="32" fill="url(#bg)"/>
  <g opacity=".18" stroke="#8b5cf6"><path d="M0 80h1200M0 160h1200M0 240h1200M0 320h1200M0 400h1200M0 480h1200"/><path d="M100 0v560M300 0v560M500 0v560M700 0v560M900 0v560M1100 0v560"/></g>
  <text x="72" y="86" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="700">Turn production lessons into agent guardrails</text>
  <text x="72" y="124" fill="#aeb9ca" font-family="Inter,Arial,sans-serif" font-size="18">Evidence travels from the failure to the rule, the recipe, the gate, and the result.</text>
  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(64 190)"><rect width="220" height="230" rx="22" fill="#111b2b" stroke="#34445d"/><circle cx="44" cy="44" r="18" fill="#ff6b6b"/><path d="M44 34v14m0 8h.1" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="28" y="100" fill="#ff9b9b" font-size="13" font-weight="700" letter-spacing="2">01 · EVIDENCE</text><text x="28" y="137" fill="#fff" font-size="23" font-weight="700">Failure mode</text><text x="28" y="173" fill="#aeb9ca" font-size="15">A reproducible defect,</text><text x="28" y="196" fill="#aeb9ca" font-size="15">review miss, or incident.</text></g>
    <g transform="translate(348 190)"><rect width="220" height="230" rx="22" fill="#15182e" stroke="#55468b"/><circle cx="44" cy="44" r="18" fill="#8b5cf6"/><path d="M36 44h16M44 36v16" stroke="#fff" stroke-width="3" stroke-linecap="round"/><text x="28" y="100" fill="#bda6ff" font-size="13" font-weight="700" letter-spacing="2">02 · PATTERN</text><text x="28" y="137" fill="#fff" font-size="23" font-weight="700">Rule + recipe</text><text x="28" y="173" fill="#aeb9ca" font-size="15">Human TL;DR and exact</text><text x="28" y="196" fill="#aeb9ca" font-size="15">instructions for agents.</text></g>
    <g transform="translate(632 190)"><rect width="220" height="230" rx="22" fill="#111e2d" stroke="#315a77"/><circle cx="44" cy="44" r="18" fill="#2997ff"/><path d="m35 44 6 6 12-14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="28" y="100" fill="#7bc0ff" font-size="13" font-weight="700" letter-spacing="2">03 · GATE</text><text x="28" y="137" fill="#fff" font-size="23" font-weight="700">Automated proof</text><text x="28" y="173" fill="#aeb9ca" font-size="15">Tests and scripts block</text><text x="28" y="196" fill="#aeb9ca" font-size="15">the regression in CI.</text></g>
    <g transform="translate(916 190)"><rect width="220" height="230" rx="22" fill="#10231f" stroke="#356a5e"/><circle cx="44" cy="44" r="18" fill="#31c48d"/><path d="M35 48c10-16 18-8 18-8" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/><text x="28" y="100" fill="#70e3b7" font-size="13" font-weight="700" letter-spacing="2">04 · OUTCOME</text><text x="28" y="137" fill="#fff" font-size="23" font-weight="700">Mergeable work</text><text x="28" y="173" fill="#aeb9ca" font-size="15">Agents ship changes a</text><text x="28" y="196" fill="#aeb9ca" font-size="15">reviewer can trust.</text></g>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"><path d="M294 305h42"/><path d="m327 296 9 9-9 9"/><path d="M578 305h42"/><path d="m611 296 9 9-9 9"/><path d="M862 305h42"/><path d="m895 296 9 9-9 9"/></g>
  <g transform="translate(64 474)" font-family="JetBrains Mono,monospace" font-size="15"><rect width="1072" height="46" rx="12" fill="#0a0f19" stroke="#293446"/><circle cx="24" cy="23" r="5" fill="#31c48d"/><text x="42" y="29" fill="#c6d0df">Human + agent guides · deterministic answers · executable gates · Doc Bridge certified</text></g>
</svg>
